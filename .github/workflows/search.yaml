name: Deploy Search Page

on:
  push:
    branches:
      - main
      - stage
    paths:
      - apps/epd-search/**
      - packages/**
      - .github/workflows/search.yaml
  pull_request:
    branches:
      - main
      - stage
    paths:
      - apps/epd-search/**
      - packages/**
      - .github/workflows/search.yaml

  workflow_dispatch:

env:
  NODE_VERSION: '24.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: NPM Install
        run: npm i

      - name: Check
        run: npm run check

      - name: Build
        run: npx turbo run @lcax/search#build
        env:
          VITE_UMAMI_ID: ${{ secrets.SEARCH_UMAMI_ID }}
          VITE_BACKEND_URL: https://api.lcax.tools

      - name: Upload artifact for deployment job
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: app
          path: ./apps/epd-search/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: app

      - name: Download MinIO CLI
        shell: bash
        run: |
          curl https://dl.min.io/client/mc/release/linux-amd64/mc \
            --create-dirs \
            -o $HOME/minio-binaries/mc
          chmod +x $HOME/minio-binaries/mc
          echo "$HOME/minio-binaries/" >> "$GITHUB_PATH"
          mc --version

      - name: test
        run: |
          ls -lah $HOME/minio-binaries/
          mc --version

      - name: Create configuration file
        shell: bash
        run: $HOME/minio-binaries/mc alias set default https://minio.chrk.site ${{ secrets.MINIO_ACCESS_KEY }} ${{ secrets.MINIO_SECRET_KEY }} --path auto --api S3v4

      - name: Upload to Bundle
        run: mc cp -r ./ default/bundles/lcax/${{ github.ref_name }}/search
