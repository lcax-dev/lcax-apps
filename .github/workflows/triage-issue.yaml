name: Triage Issues

on:
  issues:
    types: [closed]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: JetBrains/junie-github-action@v0
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          prompt: |
            Triage all open issues with the `needs-triage` label.
            For each issue, follow the `triage` skill:
            1. If it's fully specified, move it to `ready-for-agent` and post an agent brief as a comment.
            2. If more information is needed, move it to `needs-info` and post triage notes with specific questions for the reporter.
            3. Ensure every comment starts with: "> *This was generated by AI during triage.*"
            4. If any issue is not ready but can't be triaged automatically, leave it with `needs-triage` and explain why in a comment.
            If there are no issues with the `needs-triage` label, stop and exit.