name: Start Coder Workspace

on:
  issues:
    types: [labeled]

jobs:
  start-workspace:
    if: (github.event.action == 'labeled' && github.event.label.name == 'ready-for-agent')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Start Coder Workspace
        uses: coder/start-workspace-action@v0.2.0
        with:
          coder-url: https://coder.chrk.site
          coder-token: ${{ secrets.CODER_TOKEN }}
          template-name: lcax-apps-devcontainer
          workspace-name: lcax-apps-issue-${{ github.event.issue.number }}
          coder-username: christian-kongsgaard
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-issue-number: ${{ github.event.issue.number }}
          parameters: |-
            junie_prompt: "load skills, agents and commands. Then use /do-work issueId=${{ github.event.issue.number }}"
