query GetEpd($id: String!) {
  epds(where: { id: { eq: $id } }, limit: 1) {
    id
    name
    epdId
    type
    declaredUnit
    version
    publishedDate
    validUntil
    referenceServiceLife
    standard
    location
    subtype
    metaData
    source {
      name
      url
    }
    conversions {
      value
      to
      metaData
    }
    impacts {
      gwp {
        a1a3
        a4
        a5
        b1
        b2
        b3
