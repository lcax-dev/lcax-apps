overwrite: true
schema:
  - '../../services/lcax/schema.graphql'
documents: 'src/queries/*.graphql'
hooks:
  afterAllFileWrite:
    - 'oxfmt src/queries'
generates:
  src/queries/introspection.json:
    plugins:
      - introspection
    config:
      minify: true
  src/queries/generated.ts:
    documents: 'src/queries/*.graphql'
    plugins:
      - 'typescript'
      - 'typescript-resolvers'
      - 'typescript-operations'
      - 'typescript-react-apollo'
    config:
      withHooks: true
      withComponent: false
      withHOC: false
      federation: true
      apolloReactHooksImportFrom: '@apollo/client/react'
