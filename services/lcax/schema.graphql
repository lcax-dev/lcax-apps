input EpdsFilters {
  id: StringFilter
  name: StringFilter
  type: StringFilter
  version: StringFilter
  publishedDate: StringFilter
  validUntil: StringFilter
  declaredUnit: UnitFilter
  standard: StandardFilter
  location: CountryFilter
  subtype: SubTypeFilter
  comment: StringFilter
  referenceServiceLife: IntFilter
  OR: [EpdsFilters]
}

input StringFilter {
  contains: String
  eq: String
  isNull: Boolean
}

input UnitFilter {
  eq: UnitEnum
  isNull: Boolean
}

input StandardFilter {
  eq: StandardEnum
  isNull: Boolean
}

input CountryFilter {
  eq: CountryEnum
  isNull: Boolean
}

input SubTypeFilter {
  eq: SubTypeEnum
  isNull: Boolean
}

input IntFilter {
  eq: Int
  isNull: Boolean
}

input EpdsOrderBy {
  id: SortOrder
  name: SortOrder
  type: SortOrder
  version: SortOrder
  publishedDate: SortOrder
  validUntil: SortOrder
  declaredUnit: SortOrder
  standard: SortOrder
  location: SortOrder
  subtype: SortOrder
  comment: SortOrder
  referenceServiceLife: SortOrder
}

enum SortOrder {
  asc
  desc
}

type Mutation {
  calculateProject(project: ProjectInput): Project!
  addEpds(values: [EpdsInsertInput!]!): [EPD!]!
  deleteEpds(where: EpdsFilters): [EPD!]!
  updateEpds(set: EpdsUpdateInput!, where: EpdsFilters): [EPD!]!
  signup(email: String!, password: String!, name: String!): AuthResponse!
  login(email: String!, password: String!): AuthResponse!
}

type AuthResponse {
  user: User
  session: Session
}

type User {
  id: String!
  email: String!
  name: String!
  emailVerified: Boolean!
  image: String
  createdAt: String!
  updatedAt: String!
}

type Session {
  id: String!
  userId: String!
  expiresAt: String!
  token: String!
  ipAddress: String
  userAgent: String
}

type Project {
  id: String!
  name: String!
  description: String
  comment: String
  location: ProjectLocation!
  owner: String
  formatVersion: String!
  lciaMethod: String
  classificationSystems: [String]
  referenceStudyPeriod: Int
  lifeCycleModules: [String]
  impactCategories: [String]
  assemblies: [Assembly]
  results: Impacts
  projectInfo: ProjectInfo
  projectPhase: String
  softwareInfo: SoftwareInfo
  metaData: String
}

type ProjectLocation {
  country: CountryEnum!
  city: String
  address: String
}

type Assembly {
  id: String!
  name: String!
  type: String!
  description: String
  comment: String
  quantity: Float!
  unit: UnitEnum!
  classification: [Classification]!
  products: [Product]!
  results: Impacts
  metaData: JSONObject
  workspaceId: String
  projectId: String
  modelId: String
}

type Classification {
  name: String
  system: String
  code: String
}

type Product {
  id: String
  name: String
  type: String
  description: String
  referenceServiceLife: Int
  impactData: [EPD]
  quantity: Float
  unit: String
  transport: String
  results: Impacts
  metaData: JSONObject
}

type ProjectInfo {
  type: String
  buildingType: String
  buildingTypology: [String]
  certifications: [String]
  buildingMass: Float
  buildingHeight: Float
  grossFloorArea: ProjectArea
  heatedFloorArea: ProjectArea
  buildingFootprint: Float
  floorsAboveGround: Int
  floorsBelowGround: Int
  roofType: String
